<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Aniversário</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
font-family:Arial;
overflow:hidden;
}

.container{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* BOLO */

.cake{
animation:slideInCake 1.5s forwards;
}

@keyframes slideInCake{
0%{
transform:scale(0);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

.cake-emoji{
font-size:110px;
animation:bounceCake 1s infinite;
}

@keyframes bounceCake{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-20px)}
}

/* CARTA */

.envelope-container{
position:fixed;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
opacity:0;
animation:fadeInEnvelope 0.3s ease-out 3s forwards;
}

@keyframes fadeInEnvelope{
to{opacity:1}
}

.envelope{
cursor:pointer;
}

.envelope-body{
width:420px;
height:420px;
background:white;
border-radius:12px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
overflow:hidden;
position:relative;
}

.envelope-flap{
position:absolute;
top:0;
width:100%;
height:130px;
background:linear-gradient(135deg,#FFD700,#FFA500);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
transform-origin:top;
transition:0.8s;
z-index:2;
}

.envelope-flap.open{
transform:rotateX(-180deg);
}

.envelope-inner{
position:absolute;
top:130px;
width:100%;
height:calc(100% - 130px);
padding:20px;
overflow:auto;
text-align:center;
}

/* TEXTO */

.message-content{
font-size:22px;
font-weight:bold;
color:#333;
line-height:1.5;
margin-bottom:10px;
}

/* FIGURINHA */

.sticker-area{
margin-top:10px;
}

.sticker{
width:120px;
display:block;
margin:auto;
}

/* TEXTO LOVE */

.love-text{
margin-top:8px;
font-size:20px;
font-weight:bold;
color:#ff4d6d;
}

/* CORAÇÃO */

.heart-final{
font-size:55px;
margin-top:10px;
}

/* TEXTO CLIQUE */

.click-hint{
position:absolute;
bottom:-30px;
left:50%;
transform:translateX(-50%);
color:#444;
font-size:14px;
}

/* CONFETES */

.confetti{
position:fixed;
width:10px;
height:10px;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
opacity:0;
}
}

/* MOBILE */

@media(max-width:600px){

.envelope-body{
width:90vw;
height:420px;
}

.message-content{
font-size:19px;
}

.sticker{
width:100px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="cake">
<div class="cake-emoji">🎂</div>
</div>

</div>

<!-- CARTA -->

<div class="envelope-container">

<div class="envelope" id="envelope">

<div class="envelope-body">

<div class="envelope-flap" id="flap">
💌
</div>

<div class="envelope-inner">

<div class="message-content">
Feliz Aniversário<br><br>
que Deus te abençoe grandemente<br>
a cada dia mais de sua vida
</div>

<div class="sticker-area">

<img src="figurinha.png" class="sticker">
    <img src="figurinha1.png" class="sticker">

<div class="love-text">
I love you lots
</div>

</div>

<div class="heart-final">❤️</div>

</div>

</div>

<div class="click-hint">
Clique para abrir
</div>

</div>

</div>

<script>

const envelope=document.getElementById("envelope")
const flap=document.getElementById("flap")

let aberto=false

envelope.addEventListener("click",()=>{

if(!aberto){

flap.classList.add("open")

createConfetti()

aberto=true

}

})

function createConfetti(){

const colors=["#FF6B6B","#4ECDC4","#45B7D1","#FFA07A","#F7DC6F"]

for(let i=0;i<80;i++){

const confetti=document.createElement("div")

confetti.className="confetti"

confetti.style.left=Math.random()*window.innerWidth+"px"

confetti.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)]

confetti.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(confetti)

setTimeout(()=>{

confetti.remove()

},5000)

}

}

</script>

</body>
</html>
