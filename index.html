<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Aniversário</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
font-family:Arial;
overflow:hidden;
}

.container{
position:relative;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.cake{
animation:slideIn 1.5s forwards;
}

@keyframes slideIn{
0%{transform:scale(0);opacity:0}
100%{transform:scale(1);opacity:1}
}

.cake-emoji{
font-size:120px;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-20px)}
}

.envelope-container{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
animation:showEnvelope 1s 3s forwards;
}

@keyframes showEnvelope{
to{opacity:1}
}

.envelope{
cursor:pointer;
}

.envelope-body{
width:400px;
height:320px;
background:white;
border-radius:10px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
position:relative;
overflow:hidden;
}

.envelope-flap{
position:absolute;
top:0;
width:100%;
height:120px;
background:gold;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
transition:0.8s;
transform-origin:top;
}

.envelope-flap.open{
transform:rotateX(-180deg);
}

.envelope-inner{
margin-top:120px;
padding:20px;
text-align:center;
}

.message-content{
font-size:24px;
font-weight:bold;
color:#333;
}

.heart-final{
font-size:60px;
margin-top:10px;
}

.sticker-area{
margin-top:15px;
text-align:center;
}

.sticker{
width:160px;
}

.love-text{
font-size:22px;
font-weight:bold;
color:#ff4d6d;
margin-top:10px;
}

.click-hint{
text-align:center;
margin-top:10px;
color:#555;
}

.confetti{
position:fixed;
width:10px;
height:10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<div class="cake">

<div class="cake-emoji">🎂</div>

</div>

</div>

<div class="envelope-container">

<div class="envelope" id="envelope">

<div class="envelope-body">

<div class="envelope-flap" id="flap">
💌
</div>

<div class="envelope-inner">

<div class="message-content">
Feliz Aniversário<br><br>
que Deus te abençoe grandemente<br>
a cada dia mais de sua vida
</div>

<div class="sticker-area">

<img src="figurinha.png" class="sticker">
    <img src="figurinha1.png" class="sticker">

<div class="love-text">
I love you lots
</div>

</div>

<div class="heart-final">❤️</div>

</div>

</div>

<div class="click-hint">Clique para abrir</div>

</div>

</div>

<script>

const envelope=document.getElementById("envelope")
const flap=document.getElementById("flap")

let open=false

envelope.addEventListener("click",()=>{

if(!open){

flap.classList.add("open")

createConfetti()

open=true

}

})

function createConfetti(){

const colors=["#FF6B6B","#4ECDC4","#45B7D1","#FFA07A","#F7DC6F"]

for(let i=0;i<80;i++){

const confetti=document.createElement("div")

confetti.className="confetti"

confetti.style.left=Math.random()*window.innerWidth+"px"

confetti.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)]

confetti.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(confetti)

setTimeout(()=>{

confetti.remove()

},5000)

}

}

</script>

</body>
</html>
